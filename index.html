<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>업무 대시보드</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080b14"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080b14;--s1:#0e1120;--s2:#141728;--s3:#1a1e30;
  --bd:#1e2238;--bd2:#252840;
  --t1:#eef0ff;--t2:#7c85b0;--t3:#3d4568;
  --ac:#6366f1;--ac2:#8b5cf6;
  --naver:#03c75a;--tistory:#ff6b2b;--blogger:#4285f4;
  --ok:#22c55e;--warn:#f59e0b;--err:#ef4444;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── LOCK SCREEN ──────────────────────────────── */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;overflow:hidden}
#lock::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,.18) 0%,transparent 70%);top:-100px;left:-100px;pointer-events:none}
#lock::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,.12) 0%,transparent 70%);bottom:-100px;right:-50px;pointer-events:none}
.lock-card{background:rgba(14,17,32,.9);border:1px solid var(--bd);border-radius:24px;padding:44px 38px;width:360px;text-align:center;position:relative;backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,.6)}
.lock-glow{position:absolute;inset:-1px;border-radius:25px;background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(139,92,246,.15),transparent 60%);z-index:-1;pointer-events:none}
.lock-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px;box-shadow:0 8px 32px rgba(99,102,241,.4)}
.lock-brand{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.lock-brand span{background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lock-sub{color:var(--t3);font-size:13px;margin-bottom:28px;line-height:1.5}
.lock-inp{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:11px;color:var(--t1);font-size:15px;padding:13px 16px;outline:none;margin-bottom:10px;font-family:inherit;transition:.2s}
.lock-inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.lock-action{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:600;padding:13px;cursor:pointer;font-family:inherit;margin-top:4px;transition:.2s;letter-spacing:.2px}
.lock-action:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.lock-err{color:var(--err);font-size:12px;margin-top:10px;min-height:16px}

/* ── LAYOUT ───────────────────────────────────── */
#app{display:none}
.sidebar{width:248px;background:var(--s1);border-right:1px solid var(--bd);height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:100;transition:.25s}
.sidebar.hidden{transform:translateX(-100%)}
.main{margin-left:248px;padding:28px 28px 48px;min-height:100vh;transition:.25s}
.main.full{margin-left:0}

/* ── SIDEBAR ──────────────────────────────────── */
.s-header{padding:22px 16px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.s-logo{display:flex;align-items:center;gap:10px}
.s-logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 12px rgba(99,102,241,.35)}
.s-logo-name{color:#fff;font-weight:700;font-size:13px;letter-spacing:-.2px}
.s-logo-sub{background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:10px;font-weight:600;margin-top:1px}
.close-sidebar{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:4px 7px;border-radius:6px;transition:.15s}
.close-sidebar:hover{color:var(--ac);background:var(--s2)}
.s-nav{flex:1;padding:10px 8px;overflow:auto}
.nav-section{color:var(--t3);font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:0 10px;margin:16px 0 4px;display:flex;align-items:center;gap:8px}
.nav-section::after{content:'';flex:1;height:1px;background:var(--bd)}
.nav-section:first-child{margin-top:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;border:none;background:transparent;width:100%;font-family:inherit;transition:.15s;position:relative}
.nav-item:hover{background:var(--s2);color:var(--t1)}
.nav-item.active{background:rgba(99,102,241,.15);color:#a5b4fc}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:linear-gradient(to bottom,#6366f1,#8b5cf6);border-radius:0 2px 2px 0}
.nav-item .ni{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.nav-item .nb{margin-left:auto;background:var(--s3);color:var(--ac);font-size:10px;font-weight:700;border-radius:10px;padding:2px 7px;min-width:20px;text-align:center}
.nav-item.active .nb{background:rgba(99,102,241,.25)}
.s-footer{padding:10px 8px 16px;border-top:1px solid var(--bd)}
.footer-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;background:transparent;border:none;color:var(--t3);font-size:13px;cursor:pointer;border-radius:8px;font-family:inherit;transition:.15s}
.footer-btn:hover{background:var(--s2);color:var(--err)}

/* ── PAGE HEADER ──────────────────────────────── */
.page-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.page-title-wrap{flex:1}
.page-title{color:#fff;font-size:21px;font-weight:700;letter-spacing:-.3px}
.page-date{color:var(--t3);font-size:12px;margin-top:2px}
.menu-btn{background:var(--s1);border:1px solid var(--bd);color:var(--t2);font-size:18px;border-radius:9px;padding:7px 11px;cursor:pointer;display:none;transition:.15s}
.menu-btn:hover{border-color:var(--ac);color:var(--ac)}
.add-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.2s;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.add-btn:hover{opacity:.88;transform:translateY(-1px)}

/* ── STAT CARDS ───────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:18px 18px 16px;position:relative;overflow:hidden;transition:.2s}
.stat-card:hover{border-color:var(--bd2);transform:translateY(-1px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.accent-purple::before{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.accent-green::before{background:linear-gradient(90deg,#22c55e,#16a34a)}
.accent-blue::before{background:linear-gradient(90deg,#60a5fa,#3b82f6)}
.accent-red::before{background:linear-gradient(90deg,#f87171,#ef4444)}
.sc-label{color:var(--t3);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.sc-val{color:#fff;font-size:30px;font-weight:700;line-height:1;letter-spacing:-1px}
.sc-sub{color:var(--t3);font-size:11px;margin-top:5px}

/* ── TASK ITEMS ───────────────────────────────── */
.task-item{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:.15s}
.task-item:hover{border-color:var(--bd2);background:var(--s2)}
.task-item.done{opacity:.4}
.t-check{width:20px;height:20px;border:2px solid var(--bd2);border-radius:6px;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s;background:transparent;color:transparent}
.t-check:hover{border-color:var(--ac)}
.t-check.checked{background:var(--ok);border-color:var(--ok);color:#000;font-weight:700}
.t-body{flex:1;min-width:0}
.t-title{color:var(--t1);font-size:14px;font-weight:500;margin-bottom:5px}
.t-title.struck{text-decoration:line-through;color:var(--t3)}
.t-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.p-badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 8px;letter-spacing:.2px}
.p-high{background:rgba(239,68,68,.15);color:#f87171}
.p-mid{background:rgba(245,158,11,.12);color:#fbbf24}
.p-low{background:rgba(96,165,250,.12);color:#60a5fa}
.cat-badge{background:var(--s3);color:var(--t2);font-size:10px;border-radius:5px;padding:2px 8px}
.due-badge{font-size:10px;color:var(--t3)}
.due-overdue{color:var(--err)}
.t-desc{color:var(--t3);font-size:12px;margin-top:5px;line-height:1.5}
.t-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:5px 6px;border-radius:6px;line-height:1;transition:.1s}
.icon-btn:hover{background:var(--s3);color:var(--t1)}

/* ── FILTER BAR ───────────────────────────────── */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.f-tab{border:1px solid var(--bd);background:var(--s1);color:var(--t2);font-size:12px;border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;transition:.15s;font-weight:500}
.f-tab.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.f-tab:hover:not(.active){background:var(--s2);color:var(--t1)}
.search-inp{background:var(--s1);border:1px solid var(--bd);border-radius:9px;color:var(--t1);font-size:13px;padding:7px 12px;outline:none;font-family:inherit;min-width:160px;transition:.2s}
.search-inp:focus{border-color:rgba(99,102,241,.5);box-shadow:0 0 0 3px rgba(99,102,241,.1)}

/* ── SECTIONS ─────────────────────────────────── */
.section{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:14px}
.sec-title{color:var(--t1);font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-cnt{color:var(--t3);font-weight:400;font-size:12px;margin-left:2px}

/* ── PROGRESS ─────────────────────────────────── */
.prog-bar{background:var(--s3);border-radius:6px;height:6px;overflow:hidden;margin:6px 0 8px}
.prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:.6s}

/* ── WEEK CHART ───────────────────────────────── */
.week-chart{display:flex;gap:5px;align-items:flex-end;height:64px;margin-top:10px}
.wc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wc-bar{width:100%;border-radius:4px 4px 0 0;background:var(--s3);min-height:3px;transition:.4s}
.wc-bar.has-data{background:linear-gradient(to top,#6366f1,#8b5cf6)}
.wc-bar.today-bar{background:linear-gradient(to top,#a5b4fc,#c4b5fd)}
.wc-day{color:var(--t3);font-size:9px;text-align:center}
.wc-day.today-day{color:#a5b4fc}

/* ── EMPTY ────────────────────────────────────── */
.empty-state{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-state .ei{font-size:36px;margin-bottom:10px;opacity:.6}
.empty-state .et{font-size:13px}

/* ── MODAL ────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:18px;padding:26px;width:100%;max-width:430px;max-height:90vh;overflow:auto;box-shadow:0 32px 80px rgba(0,0,0,.5)}
.modal-title{color:#fff;font-size:16px;font-weight:700;margin-bottom:20px;letter-spacing:-.2px}
.form-grp{margin-bottom:13px}
.form-label{color:var(--t2);font-size:11px;font-weight:600;margin-bottom:6px;display:block;letter-spacing:.3px;text-transform:uppercase}
.form-inp{width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:9px;color:var(--t1);font-size:14px;padding:11px 13px;outline:none;font-family:inherit;transition:.2s}
.form-inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
textarea.form-inp{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:10px;margin-top:10px}
.m-save{flex:1;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.m-save:hover{opacity:.88}
.m-cancel{flex:1;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;font-family:inherit;transition:.15s}
.m-cancel:hover{color:var(--t1);border-color:var(--ac)}

/* ── SIDEBAR OVERLAY ──────────────────────────── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:99;backdrop-filter:blur(3px)}
#sidebar-overlay.show{display:block}

/* ── DASHBOARD HERO ───────────────────────────── */
.dash-hero{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));border:1px solid rgba(99,102,241,.2);border-radius:16px;padding:22px 24px;margin-bottom:18px;position:relative;overflow:hidden}
.dash-hero::after{content:'📋';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:60px;opacity:.08}
.dash-hero-title{color:#fff;font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.dash-hero-sub{color:var(--t2);font-size:13px}
.dash-hero-stats{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.hero-stat{display:flex;flex-direction:column;gap:2px}
.hero-stat-val{color:#fff;font-size:22px;font-weight:700;line-height:1;letter-spacing:-1px}
.hero-stat-label{color:var(--t3);font-size:11px;font-weight:500}

/* ── RESPONSIVE ───────────────────────────────── */
@media(max-width:720px){
  .lock-card{width:calc(100vw - 32px);max-width:360px;padding:32px 22px}
  .sidebar{transform:translateX(-248px)}
  .sidebar.open{transform:translateX(0);box-shadow:12px 0 48px rgba(0,0,0,.7)}
  .main{margin-left:0;padding:16px 14px 90px}
  .menu-btn{display:flex;align-items:center;justify-content:center}
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px}
  .dash-grid{grid-template-columns:1fr !important}
  #fx-grid,#fx-convert{grid-template-columns:repeat(auto-fill,minmax(72px,1fr)) !important;gap:6px}
  .section{padding:14px}
  .page-header{margin-bottom:16px}
  .page-title{font-size:18px}
  .add-btn{padding:9px 14px;font-size:12px}
  .form-row{grid-template-columns:1fr}
  .filter-bar{gap:6px}
  .f-tab{padding:6px 11px;font-size:12px}
  .search-inp{width:100%;min-width:unset}
  .task-item{padding:12px 12px}
  .t-check{width:22px;height:22px;border-radius:6px;font-size:12px}
  .icon-btn{padding:6px 7px;font-size:15px}
  .modal{border-radius:18px 18px 0 0;max-height:92vh;padding:22px 18px}
  .modal-bg{align-items:flex-end;padding:0}
  .modal-btns button{padding:13px}
  .sc-val{font-size:26px}
  .dash-hero{padding:18px}
}
@media(max-width:380px){
  .stat-grid{grid-template-columns:1fr 1fr;gap:8px}
  .sc-val{font-size:22px}
  .sc-label{font-size:9px}
  .bp-grid{gap:6px}
}

/* ── SCROLLBAR ────────────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--ac)}

</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock">
  <div class="lock-card">
    <div class="lock-glow"></div>
    <div class="lock-logo">📋</div>
    <div class="lock-brand">업무 <span>대시보드</span></div>
    <div class="lock-sub" id="lock-sub">비밀번호를 입력하세요</div>
    <input class="lock-inp" id="lock-pwd" type="password" placeholder="비밀번호"
      onkeydown="if(event.key==='Enter')unlockApp()"/>
    <div id="lock-confirm-wrap" style="display:none">
      <input class="lock-inp" id="lock-pwd2" type="password" placeholder="비밀번호 확인"
        onkeydown="if(event.key==='Enter')unlockApp()"/>
    </div>
    <button class="lock-action" id="lock-btn" onclick="unlockApp()">잠금 해제</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<!-- Sidebar overlay for mobile -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- App -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="s-header">
      <div class="s-logo">
        <div class="s-logo-icon">📋</div>
        <div>
          <div class="s-logo-name">업무 대시보드</div>
          <div class="s-logo-sub">프로젝트 & 일정 관리</div>
        </div>
      </div>
      <button class="close-sidebar" onclick="closeSidebar()">✕</button>
    </div>
    <div class="s-nav">
      <div class="nav-section">메뉴</div>
      <button class="nav-item active" id="nav-dashboard" onclick="showView('dashboard')">
        <span class="ni">📊</span> 대시보드
      </button>
      <button class="nav-item" id="nav-all" onclick="showView('all')">
        <span class="ni">📋</span> 전체 업무
        <span class="nb" id="badge-all">0</span>
      </button>
      <button class="nav-item" id="nav-today" onclick="showView('today')">
        <span class="ni">☀️</span> 오늘 할 일
        <span class="nb" id="badge-today">0</span>
      </button>
      <button class="nav-item" id="nav-inprog" onclick="showView('inprog')">
        <span class="ni">🔥</span> 진행 중
        <span class="nb" id="badge-inprog">0</span>
      </button>
      <button class="nav-item" id="nav-done" onclick="showView('done')">
        <span class="ni">✅</span> 완료
        <span class="nb" id="badge-done">0</span>
      </button>
    </div>
    <div class="s-footer">
      <button class="footer-btn" onclick="lockApp()">🔒 <span>잠금</span></button>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main">

    <!-- Dashboard view -->
    <div id="view-dashboard">
      <div class="page-header">
        <button class="menu-btn" onclick="openSidebar()">☰</button>
        <div class="page-title-wrap">
          <div class="page-title">대시보드</div>
          <div class="page-date" id="today-date"></div>
        </div>
        <button class="add-btn" onclick="openModal()">+ 업무 추가</button>
      </div>
      <div class="dash-hero">
        <div class="dash-hero-title">업무 대시보드 📋</div>
        <div class="dash-hero-sub">프로젝트 & 일정 관리 · 오늘 할 일 · 마감 임박 업무 추적</div>
        <div class="dash-hero-stats" id="dash-hero-stats"></div>
      </div>
      <div class="stat-grid" id="stat-grid"></div>
      <div class="section" style="margin-bottom:14px">
        <div class="sec-title" style="justify-content:space-between;margin-bottom:12px">
          <span>💱 오늘의 환율 <span style="color:var(--t3);font-size:10px;font-weight:400;margin-left:4px" id="fx-time"></span></span>
          <button onclick="fetchRates(true)" id="fx-refresh" style="background:transparent;border:1px solid var(--bd);color:var(--t3);font-size:11px;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:inherit">새로고침</button>
        </div>
        <div id="fx-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px"></div>
        <div style="border-top:1px solid var(--bd);margin-top:14px;padding-top:14px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <div style="position:relative;flex:1">
              <input type="number" id="krw-input" placeholder="원 금액 입력"
                oninput="convertKRW()"
                style="width:100%;background:var(--s2);border:1px solid var(--bd2);border-radius:9px;color:var(--t1);font-size:15px;padding:10px 44px 10px 14px;outline:none;font-family:inherit;-webkit-appearance:none;appearance:none"/>
              <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:13px;font-weight:600;pointer-events:none">원</span>
            </div>
          </div>
          <div id="fx-convert" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px"></div>

        <div class="sec-title">⏰ 마감 임박 <span class="sec-cnt" id="upcoming-cnt"></span></div>
        <div id="upcoming-tasks"></div>
      </div>
    </div>

    <!-- Tasks view -->
    <div id="view-tasks" style="display:none">
      <div class="page-header">
        <button class="menu-btn" onclick="openSidebar()">☰</button>
        <div class="page-title-wrap">
          <div class="page-title" id="tasks-title">전체 업무</div>
        </div>
        <button class="add-btn" onclick="openModal()">+ 업무 추가</button>
      </div>
      <div class="filter-bar">
        <div id="status-tabs" style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="f-tab active" id="ftab-전체" onclick="setStatusFilter('전체')">전체</button>
          <button class="f-tab" id="ftab-할일" onclick="setStatusFilter('할일')">할 일</button>
          <button class="f-tab" id="ftab-진행중" onclick="setStatusFilter('진행중')">진행 중</button>
          <button class="f-tab" id="ftab-완료" onclick="setStatusFilter('완료')">완료</button>
        </div>
        <input class="search-inp" id="search-inp" placeholder="🔍 검색..." oninput="renderTaskList()"/>
      </div>
      <div id="task-list"></div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-title">업무 추가</div>
    <div class="form-grp">
      <label class="form-label">업무명 *</label>
      <input class="form-inp" id="f-title" placeholder="업무 제목을 입력하세요"/>
    </div>
    <div class="form-grp">
      <label class="form-label">설명</label>
      <textarea class="form-inp" id="f-desc" placeholder="상세 설명 (선택 사항)"></textarea>
    </div>
    <div class="form-row">
      <div class="form-grp">
        <label class="form-label">우선순위</label>
        <select class="form-inp" id="f-priority">
          <option value="높음">🔴 높음</option>
          <option value="중간" selected>🟡 중간</option>
          <option value="낮음">🔵 낮음</option>
        </select>
      </div>
      <div class="form-grp">
        <label class="form-label">상태</label>
        <select class="form-inp" id="f-status">
          <option value="할일">할 일</option>
          <option value="진행중">진행 중</option>
          <option value="완료">완료</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-grp">
        <label class="form-label">카테고리</label>
        <input class="form-inp" id="f-cat" placeholder="예: 개발, 기획"/>
      </div>
      <div class="form-grp">
        <label class="form-label">마감일</label>
        <input class="form-inp" id="f-due" type="date"/>
      </div>

    <div class="modal-btns">
      <button class="m-save" onclick="saveTask()">저장</button>
      <button class="m-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script>
var TASKS_KEY = 'wdash_tasks_v1';
var PASS_KEY  = 'wdash_pass_v1';

var tasks = [];
var currentView = 'dashboard';
var statusFilter = '전체';
var editingId = null;
var sidebarOpen = true;

// ---- CRYPTO ----
async function hashPwd(pwd) {
  var enc = new TextEncoder();
  var data = enc.encode(pwd + '__wdb_x9_salt__');
  var buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

// ---- LOCK / UNLOCK ----
function initLock() {
  var hasPass = !!localStorage.getItem(PASS_KEY);
  if (!hasPass) {
    document.getElementById('lock-sub').textContent = '처음 사용하시나요? 비밀번호를 설정해주세요';
    document.getElementById('lock-confirm-wrap').style.display = 'block';
    document.getElementById('lock-btn').textContent = '비밀번호 설정';
  }
  document.getElementById('lock-pwd').focus();
}

async function unlockApp() {
  var pwd  = document.getElementById('lock-pwd').value;
  var errEl = document.getElementById('lock-err');
  errEl.textContent = '';

  if (!pwd) { errEl.textContent = '비밀번호를 입력해주세요'; return; }

  var hasPass = !!localStorage.getItem(PASS_KEY);

  if (!hasPass) {
    var pwd2 = document.getElementById('lock-pwd2').value;
    if (!pwd2) { errEl.textContent = '비밀번호를 다시 입력해주세요'; return; }
    if (pwd !== pwd2) { errEl.textContent = '비밀번호가 일치하지 않습니다'; return; }
    if (pwd.length < 4) { errEl.textContent = '비밀번호는 4자 이상이어야 합니다'; return; }
    localStorage.setItem(PASS_KEY, await hashPwd(pwd));
    enterApp();
  } else {
    var hash = await hashPwd(pwd);
    if (hash === localStorage.getItem(PASS_KEY)) {
      enterApp();
    } else {
      errEl.textContent = '비밀번호가 틀렸습니다';
      document.getElementById('lock-pwd').value = '';
      document.getElementById('lock-pwd').focus();
    }
  }
}

function enterApp() {
  document.getElementById('lock').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
  render();
  fetchRates();
}

// ---- EXCHANGE RATES ----
var FX_CACHE_KEY = 'wdash_fx_v1';
var FX_CURRENCIES = [
  { code:'USD', name:'달러',       flag:'🇺🇸', per:1,   symbol:'$',   decimals:2 },
  { code:'EUR', name:'유로',       flag:'🇪🇺', per:1,   symbol:'€',   decimals:2 },
  { code:'JPY', name:'엔화',       flag:'🇯🇵', per:100, symbol:'¥',   decimals:0 },
  { code:'CNY', name:'위안',       flag:'🇨🇳', per:1,   symbol:'¥',   decimals:2 },
  { code:'GBP', name:'파운드',     flag:'🇬🇧', per:1,   symbol:'£',   decimals:2 },
  { code:'AUD', name:'호주달러',   flag:'🇦🇺', per:1,   symbol:'A$',  decimals:2 },
  { code:'HKD', name:'홍콩달러',   flag:'🇭🇰', per:1,   symbol:'HK$', decimals:2 },
  { code:'TWD', name:'대만달러',   flag:'🇹🇼', per:1,   symbol:'NT$', decimals:2 },
  { code:'THB', name:'바트',       flag:'🇹🇭', per:1,   symbol:'฿',   decimals:2 },
  { code:'CAD', name:'캐나다달러', flag:'🇨🇦', per:1,   symbol:'C$',  decimals:2 },
  { code:'SGD', name:'싱가폴달러', flag:'🇸🇬', per:1,   symbol:'S$',  decimals:2 },
  { code:'AED', name:'디르함',     flag:'🇦🇪', per:1,   symbol:'د.إ', decimals:2 },
];
var fxRates = null;

async function fetchRates(force) {
  var fxGrid = document.getElementById('fx-grid');
  if (!fxGrid) return;

  if (!force) {
    try {
      var cached = JSON.parse(localStorage.getItem(FX_CACHE_KEY)||'null');
      if (cached && Date.now() - cached.ts < 3600000) { renderRates(cached); return; }
    } catch(e) {}
  }

  fxGrid.innerHTML = '<div style="grid-column:1/-1;color:var(--t3);font-size:12px;padding:4px 0">환율 불러오는 중...</div>';
  try {
    var res = await fetch('https://open.er-api.com/v6/latest/USD');
    var data = await res.json();
    var obj = { ts: Date.now(), rates: data.rates };
    localStorage.setItem(FX_CACHE_KEY, JSON.stringify(obj));
    renderRates(obj);
  } catch(e) {
    fxGrid.innerHTML = '<div style="grid-column:1/-1;color:var(--err);font-size:12px;padding:4px 0">환율 정보를 불러올 수 없습니다</div>';
  }
}

function renderRates(obj) {
  fxRates = obj.rates;
  var krw = obj.rates.KRW;
  var html = '';
  FX_CURRENCIES.forEach(function(c) {
    var rate = Math.round(krw / obj.rates[c.code] * c.per);
    var label = c.per > 1 ? c.per + ' ' + c.code : '1 ' + c.code;
    html += '<div style="background:var(--s2);border-radius:9px;padding:11px 10px;text-align:center">' +
      '<div style="font-size:22px;line-height:1;margin-bottom:5px">'+c.flag+'</div>' +
      '<div style="color:var(--t2);font-size:10px;font-weight:600;letter-spacing:.3px;margin-bottom:3px">'+label+'</div>' +
      '<div style="color:#fff;font-size:14px;font-weight:700;line-height:1">'+rate.toLocaleString()+'</div>' +
      '<div style="color:var(--t3);font-size:10px;margin-top:2px">원</div>' +
      '</div>';
  });
  document.getElementById('fx-grid').innerHTML = html;
  var d = new Date(obj.ts);
  var el = document.getElementById('fx-time');
  if (el) el.textContent = (d.getMonth()+1)+'.'+(d.getDate())+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')+' 기준';
  convertKRW();
}

function convertKRW() {
  var el = document.getElementById('fx-convert');
  if (!el) return;
  var krwAmt = parseFloat((document.getElementById('krw-input')||{}).value) || 0;
  if (!fxRates || krwAmt <= 0) {
    el.innerHTML = '';
    return;
  }
  var krw = fxRates.KRW;
  var html = '';
  FX_CURRENCIES.forEach(function(c) {
    var converted = krwAmt / krw * fxRates[c.code];
    var fmt = converted >= 100
      ? converted.toLocaleString('ko-KR', { maximumFractionDigits: 0 })
      : converted.toLocaleString('ko-KR', { minimumFractionDigits: c.decimals, maximumFractionDigits: c.decimals });
    html += '<div style="background:var(--s3);border:1px solid var(--bd2);border-radius:9px;padding:11px 10px;text-align:center">' +
      '<div style="font-size:18px;line-height:1;margin-bottom:4px">'+c.flag+'</div>' +
      '<div style="color:var(--t3);font-size:10px;font-weight:600;margin-bottom:4px">'+c.name+'</div>' +
      '<div style="color:#a5b4fc;font-size:13px;font-weight:700;line-height:1">'+c.symbol+' '+fmt+'</div>' +
      '</div>';
  });
  el.innerHTML = html;
}

function lockApp() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('lock').style.display = 'flex';
  document.getElementById('lock-pwd').value = '';
  document.getElementById('lock-err').textContent = '';
  // Restore to check-password mode if password exists
  var hasPass = !!localStorage.getItem(PASS_KEY);
  if (hasPass) {
    document.getElementById('lock-sub').textContent = '비밀번호를 입력해주세요';
    document.getElementById('lock-confirm-wrap').style.display = 'none';
    document.getElementById('lock-btn').textContent = '잠금 해제';
  }
  document.getElementById('lock-pwd').focus();
}

// ---- DATA ----
function loadData() {
  try {
    var d = localStorage.getItem(TASKS_KEY);
    tasks = d ? JSON.parse(d) : [];
  } catch(e) { tasks = []; }
}

function saveData() {
  try { localStorage.setItem(TASKS_KEY, JSON.stringify(tasks)); } catch(e) {}
}

// ---- DATE HELPERS ----
function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function isOverdue(due) {
  return !!due && due < todayStr();
}

function isToday(due) {
  return due === todayStr();
}

function isDueSoon(due) {
  if (!due) return false;
  var diff = (new Date(due) - new Date(todayStr())) / 86400000;
  return diff > 0 && diff <= 3;
}

function fmtDate(d) {
  if (!d) return '';
  var p = d.split('-');
  return p[1]+'월 '+p[2]+'일';
}

// ---- SIDEBAR ----
function openSidebar() {
  sidebarOpen = true;
  document.getElementById('sidebar').classList.add('open');
  if (window.innerWidth <= 720) {
    document.getElementById('sidebar-overlay').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
  document.body.style.overflow = '';
  if (window.innerWidth <= 720) sidebarOpen = false;
}

// ---- RENDER ----
function render() {
  updateDate();
  updateBadges();
  if (currentView === 'dashboard') renderDashboard();
  else renderTaskList();
}

function updateDate() {
  var d = new Date();
  var days = ['일','월','화','수','목','금','토'];
  var el = document.getElementById('today-date');
  if (el) el.textContent = d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+')';
}

function updateBadges() {
  var active = tasks.filter(function(t){ return t.status !== '완료'; });
  document.getElementById('badge-all').textContent    = active.length;
  document.getElementById('badge-today').textContent  = active.filter(function(t){ return isToday(t.dueDate); }).length;
  document.getElementById('badge-inprog').textContent = tasks.filter(function(t){ return t.status==='진행중'; }).length;
  document.getElementById('badge-done').textContent   = tasks.filter(function(t){ return t.status==='완료'; }).length;
}

function renderDashboard() {
  var total   = tasks.length;
  var done    = tasks.filter(function(t){ return t.status==='완료'; }).length;
  var inprog  = tasks.filter(function(t){ return t.status==='진행중'; }).length;
  var overdue = tasks.filter(function(t){ return t.status!=='완료' && isOverdue(t.dueDate); }).length;
  var rate    = total > 0 ? Math.round(done / total * 100) : 0;

  var heroEl = document.getElementById('dash-hero-stats');
  if (heroEl) {
    heroEl.innerHTML =
      '<div class="hero-stat"><div class="hero-stat-val">'+total+'</div><div class="hero-stat-label">전체 업무</div></div>' +
      '<div class="hero-stat"><div class="hero-stat-val">'+done+'</div><div class="hero-stat-label">완료</div></div>' +
      '<div class="hero-stat"><div class="hero-stat-val">'+rate+'%</div><div class="hero-stat-label">달성률</div></div>' +
      '<div class="hero-stat"><div class="hero-stat-val">'+inprog+'</div><div class="hero-stat-label">진행 중</div></div>';
  }

  document.getElementById('stat-grid').innerHTML =
    mkStat('전체 업무', total, '개', 'accent-purple') +
    mkStat('완료', done, '개 ('+rate+'%)', 'accent-green') +
    mkStat('진행 중', inprog, '개', 'accent-blue') +
    mkStat('기한 초과', overdue, '개', 'accent-red');

  // Today's tasks
  var todayList = tasks.filter(function(t){ return t.status!=='완료' && isToday(t.dueDate); });
  document.getElementById('today-cnt').textContent = todayList.length + '개';
  document.getElementById('today-tasks').innerHTML = todayList.length
    ? todayList.map(taskHtml).join('')
    : emptyState('☀️', '오늘 마감인 업무가 없습니다');

  // Weekly stats
  var weekDays = [];
  var dayLabels = ['일','월','화','수','목','금','토'];
  for (var i=6; i>=0; i--) {
    var d = new Date(); d.setDate(d.getDate()-i);
    weekDays.push({ date: d.toISOString().slice(0,10), label: dayLabels[d.getDay()] });
  }
  var maxCnt = 1;
  var counts = weekDays.map(function(wd) {
    var cnt = tasks.filter(function(t){ return t.completedAt && new Date(t.completedAt).toISOString().slice(0,10)===wd.date; }).length;
    if (cnt > maxCnt) maxCnt = cnt;
    return { label: wd.label, date: wd.date, cnt: cnt };
  });
  var weekTotal = counts.reduce(function(s,c){ return s+c.cnt; }, 0);

  var ws = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
    '<span style="color:var(--t2);font-size:12px">전체 달성률</span>' +
    '<span style="color:#a5b4fc;font-size:12px;font-weight:600">'+rate+'%</span></div>' +
    '<div class="prog-bar"><div class="prog-fill" style="width:'+rate+'%"></div></div>' +
    '<div style="color:var(--t3);font-size:11px;margin-bottom:10px">이번 주 완료: <span style="color:#a5b4fc;font-weight:600">'+weekTotal+'개</span></div>' +
    '<div class="week-chart">';
  counts.forEach(function(c) {
    var h = Math.max(3, Math.round(c.cnt / maxCnt * 56));
    var isToday2 = c.date === todayStr();
    ws += '<div class="wc-col">' +
      '<div class="wc-bar'+(c.cnt>0?' has-data':'')+(isToday2?' today-bar':'')+'" style="height:'+h+'px"></div>' +
      '<div class="wc-day'+(isToday2?' today-day':'')+'">'+c.label+'</div></div>';
  });
  ws += '</div>';
  document.getElementById('week-stats').innerHTML = ws;

  // Upcoming tasks (1-3 days)
  var upcomingList = tasks
    .filter(function(t){ return t.status!=='완료' && isDueSoon(t.dueDate); })
    .sort(function(a,b){ return a.dueDate.localeCompare(b.dueDate); });
  document.getElementById('upcoming-cnt').textContent = upcomingList.length + '개';
  document.getElementById('upcoming-tasks').innerHTML = upcomingList.length
    ? upcomingList.map(taskHtml).join('')
    : emptyState('🎉', '임박한 마감 업무가 없습니다');
}

function mkStat(label, val, sub, cls) {
  return '<div class="stat-card '+cls+'"><div class="sc-label">'+label+'</div>' +
    '<div class="sc-val">'+val+'</div><div class="sc-sub">'+sub+'</div></div>';
}

function renderTaskList() {
  var list = tasks.slice();

  if (currentView === 'today')  list = list.filter(function(t){ return isToday(t.dueDate) && t.status!=='완료'; });
  if (currentView === 'inprog') list = list.filter(function(t){ return t.status==='진행중'; });
  if (currentView === 'done')   list = list.filter(function(t){ return t.status==='완료'; });

  if (currentView === 'all' && statusFilter !== '전체') {
    list = list.filter(function(t){ return t.status === statusFilter; });
  }

  var q = ((document.getElementById('search-inp')||{}).value||'').trim().toLowerCase();
  if (q) {
    list = list.filter(function(t){
      return (t.title||'').toLowerCase().includes(q) ||
             (t.desc||'').toLowerCase().includes(q) ||
             (t.category||'').toLowerCase().includes(q);
    });
  }

  list.sort(function(a,b){
    if (a.status==='완료' && b.status!=='완료') return 1;
    if (a.status!=='완료' && b.status==='완료') return -1;
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return b.createdAt - a.createdAt;
  });

  document.getElementById('task-list').innerHTML = list.length
    ? list.map(taskHtml).join('')
    : emptyState('📋', '업무가 없습니다');
}

function taskHtml(t) {
  var done = t.status === '완료';
  var pClass = t.priority==='높음' ? 'p-high' : t.priority==='중간' ? 'p-mid' : 'p-low';
  var dueHtml = '';
  if (t.dueDate) {
    var ov = !done && isOverdue(t.dueDate);
    dueHtml = '<span class="due-badge'+(ov?' due-overdue':'')+'">'+(ov?'⚠️ ':'')+fmtDate(t.dueDate)+' 마감</span>';
  }
  return '<div class="task-item'+(done?' done':'')+'">' +
    '<div class="t-check'+(done?' checked':'')+'" onclick="toggleDone('+t.id+')">'+(done?'✓':'')+'</div>' +
    '<div class="t-body">' +
      '<div class="t-title'+(done?' struck':'')+'">'+esc(t.title)+'</div>' +
      '<div class="t-meta">' +
        '<span class="p-badge '+pClass+'">'+t.priority+'</span>' +
        (t.category ? '<span class="cat-badge">'+esc(t.category)+'</span>' : '') +
        dueHtml +
      '</div>' +
      (t.desc ? '<div class="t-desc">'+esc(t.desc)+'</div>' : '') +
    '</div>' +
    '<div class="t-actions">' +
      '<button class="icon-btn" onclick="editTask('+t.id+')" title="편집">✏️</button>' +
      '<button class="icon-btn" onclick="deleteTask('+t.id+')" title="삭제">🗑️</button>' +
    '</div>' +
  '</div>';
}

function emptyState(icon, msg) {
  return '<div class="empty-state"><div class="ei">'+icon+'</div><div class="et">'+msg+'</div></div>';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- NAVIGATION ----
function showView(v) {
  currentView = v;
  var allNavIds = ['dashboard','all','today','inprog','done'];
  allNavIds.forEach(function(id){
    var el = document.getElementById('nav-'+id);
    if (el) el.classList.toggle('active', id===v);
  });

  document.getElementById('view-dashboard').style.display = v==='dashboard' ? 'block' : 'none';
  document.getElementById('view-tasks').style.display = v!=='dashboard' ? 'block' : 'none';

  if (v !== 'dashboard') {
    var titles = {all:'전체 업무', today:'오늘 할 일', inprog:'진행 중', done:'완료'};
    document.getElementById('tasks-title').textContent = titles[v] || '업무';
    document.getElementById('status-tabs').style.display = v==='all' ? 'flex' : 'none';
    statusFilter = '전체';
    ['전체','할일','진행중','완료'].forEach(function(s){
      var el = document.getElementById('ftab-'+s);
      if (el) el.classList.toggle('active', s==='전체');
    });
    var si = document.getElementById('search-inp');
    if (si) si.value = '';
  }

  if (window.innerWidth <= 720) closeSidebar();
  render();
}

function setStatusFilter(s) {
  statusFilter = s;
  ['전체','할일','진행중','완료'].forEach(function(sf){
    var el = document.getElementById('ftab-'+sf);
    if (el) el.classList.toggle('active', sf===s);
  });
  renderTaskList();
}

// ---- TASK CRUD ----
function openModal(id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? '업무 편집' : '업무 추가';

  if (id) {
    var t = tasks.find(function(t){ return t.id===id; });
    if (!t) return;
    document.getElementById('f-title').value    = t.title;
    document.getElementById('f-desc').value     = t.desc || '';
    document.getElementById('f-priority').value = t.priority;
    document.getElementById('f-status').value   = t.status;
    document.getElementById('f-cat').value      = t.category || '';
    document.getElementById('f-due').value      = t.dueDate || '';
  } else {
    document.getElementById('f-title').value    = '';
    document.getElementById('f-desc').value     = '';
    document.getElementById('f-priority').value = '중간';
    document.getElementById('f-status').value   = '할일';
    document.getElementById('f-cat').value      = '';
    document.getElementById('f-due').value      = '';
  }

  document.getElementById('modal').style.display = 'flex';
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editingId = null;
}

function saveTask() {
  var title = document.getElementById('f-title').value.trim();
  if (!title) { alert('업무명을 입력해주세요'); return; }

  var status = document.getElementById('f-status').value;
  var data = {
    title:    title,
    desc:     document.getElementById('f-desc').value.trim(),
    priority: document.getElementById('f-priority').value,
    status:   status,
    category: document.getElementById('f-cat').value.trim(),
    dueDate:  document.getElementById('f-due').value
  };

  if (editingId) {
    for (var i=0; i<tasks.length; i++) {
      if (tasks[i].id === editingId) {
        var prev = tasks[i].status;
        if (status==='완료' && prev!=='완료') data.completedAt = Date.now();
        else if (status!=='완료') data.completedAt = null;
        else data.completedAt = tasks[i].completedAt;
        Object.assign(tasks[i], data);
        break;
      }
    }
  } else {
    var t = { id: Date.now(), createdAt: Date.now(), completedAt: status==='완료' ? Date.now() : null };
    Object.assign(t, data);
    tasks.push(t);
  }

  saveData();
  closeModal();
  render();
}

function editTask(id) { openModal(id); }

function deleteTask(id) {
  var t = tasks.find(function(t){ return t.id===id; });
  if (!t || !confirm('"'+t.title+'" 삭제할까요?')) return;
  tasks = tasks.filter(function(t){ return t.id!==id; });
  saveData();
  render();
}

function toggleDone(id) {
  for (var i=0; i<tasks.length; i++) {
    if (tasks[i].id === id) {
      if (tasks[i].status === '완료') {
        tasks[i].status = '할일';
        tasks[i].completedAt = null;
      } else {
        tasks[i].status = '완료';
        tasks[i].completedAt = Date.now();
      }
      break;
    }
  }
  saveData();
  render();
}

// ---- INIT ----
initLock();
</script>
