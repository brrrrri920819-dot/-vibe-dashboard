<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VibeCoding Dashboard</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VibeDash"/>
<meta name="theme-color" content="#0f1117"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0f1117;color:#fff;min-height:100vh}
.sidebar{width:260px;background:#16181f;border-right:1px solid #2a2d3a;height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;overflow:hidden;transition:.2s}
.sidebar.hidden{width:0;min-width:0}
.main{margin-left:260px;padding:24px;min-height:100vh;transition:.2s}
.main.full{margin-left:0}
.card{background:#16181f;border:1px solid #2a2d3a;border-radius:12px;padding:16px;margin-bottom:12px}
.btn{border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-family:inherit}
.tag{background:#1e2130;border:1px solid #2a2d3a;color:#888;font-size:11px;border-radius:5px;padding:3px 9px;display:inline-block;margin:2px}
.proj-btn{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;border-left:3px solid transparent;padding:8px 10px;cursor:pointer;margin-bottom:2px;text-align:left;color:#ccc;font-family:inherit}
.proj-btn.active{background:#1e2130}
.inp{background:#1e2130;border:1px solid #2a2d3a;border-radius:8px;color:#ddd;font-size:14px;padding:9px 12px;outline:none;width:100%;font-family:inherit;transition:border .15s}
.inp:focus{border-color:#7c3aed}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#16181f;border:1px solid #2a2d3a;border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow:auto}
.stat-card{background:#1e2130;border-radius:8px;padding:8px 10px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-btn{border:none;border-radius:20px;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit}
.file-row{display:flex;align-items:center;gap:9px;padding:7px 10px;background:#1e2130;border-radius:7px;margin-bottom:5px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}

/* ===== YouTube Mode ===== */
.tab-btn{flex:1;background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 6px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;color:#444;transition:.15s;letter-spacing:.3px}
.tab-btn.active{color:#fff}
.tab-btn.tab-proj.active{border-bottom-color:#7c3aed;color:#a78bfa}
.tab-btn.tab-yt.active{border-bottom-color:#ff0000;color:#ff6b6b}
.yt-topic-btn{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;border-left:3px solid transparent;padding:8px 10px;cursor:pointer;margin-bottom:2px;text-align:left;color:#ccc;font-family:inherit;transition:.1s}
.yt-topic-btn:hover{background:#1a1c24}
.yt-topic-btn.active{background:#1e2130}
.kit-card{background:#16181f;border:1px solid #2a2d3a;border-radius:12px;padding:16px;margin-bottom:12px}
.kit-label{color:#444;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.title-row{background:#1e2130;border:1px solid #2a2d3a;border-radius:9px;padding:13px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.title-row:hover{border-color:#7c3aed;background:#1a1c24}
.outline-step{border-left:2px solid #7c3aed;padding:9px 12px;margin-bottom:9px;background:#1e2130;border-radius:0 8px 8px 0}
.kw-chip{background:#1e2130;border:1px solid #2a2d3a;color:#888;font-size:11px;border-radius:5px;padding:3px 9px;display:inline-block;margin:2px;cursor:pointer;transition:.1s}
.kw-chip:hover{color:#a78bfa;border-color:#7c3aed}
.thumb-card{border-radius:10px;padding:20px 14px;cursor:pointer;text-align:center;border:2px solid transparent;transition:.15s}
.thumb-card:hover{border-color:rgba(255,255,255,.4);transform:scale(1.03)}
.chk-box{width:18px;height:18px;border-radius:4px;border:1.5px solid #2a2d3a;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.chk-box.done{background:#7c3aed;border-color:#7c3aed}
.toast-msg{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:9px 22px;border-radius:22px;font-size:13px;font-weight:700;z-index:9999;font-family:inherit;pointer-events:none;animation:fadeup .2s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <!-- Logo header -->
  <div style="padding:16px 20px 14px;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#2563eb);display:flex;align-items:center;justify-content:center;font-size:16px">⚡</div>
      <div>
        <div style="color:#fff;font-weight:700;font-size:14px">VibeCoding</div>
        <div style="color:#444;font-size:11px">내 프로젝트 대시보드</div>
      </div>
    </div>
    <button onclick="toggleSidebar()" style="background:none;border:none;color:#444;font-size:18px;cursor:pointer">←</button>
  </div>

  <!-- Mode Tabs -->
  <div style="display:flex;border-bottom:1px solid #2a2d3a;flex-shrink:0">
    <button class="tab-btn tab-proj active" id="tab-proj" onclick="setMode('proj')">⚡ 프로젝트</button>
    <button class="tab-btn tab-yt" id="tab-yt" onclick="setMode('yt')">▶ 유튜브</button>
  </div>

  <!-- ===== PROJECT SIDEBAR ===== -->
  <div id="proj-sidebar" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="padding:12px 20px;border-bottom:1px solid #2a2d3a;flex-shrink:0">
      <div id="stats" style="display:grid;grid-template-columns:1fr 1fr;gap:7px"></div>
    </div>
    <div style="padding:10px 20px 4px;flex-shrink:0">
      <div style="color:#333;font-size:10px;font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">필터</div>
      <div id="filters"></div>
    </div>
    <div style="flex:1;overflow:auto;padding:8px 20px">
      <div style="color:#333;font-size:10px;font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">프로젝트</div>
      <div id="proj-list"></div>
    </div>
    <div style="padding:10px 20px 16px;flex-shrink:0">
      <button class="btn" onclick="openModal()" style="width:100%;background:#1e2130;border:1px solid rgba(124,58,237,.3);color:#a78bfa;font-weight:600">+ 프로젝트 추가</button>
    </div>
  </div>

  <!-- ===== YOUTUBE SIDEBAR ===== -->
  <div id="yt-sidebar" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div style="padding:10px 14px 6px;flex-shrink:0">
      <div style="color:#333;font-size:10px;font-weight:600;margin-bottom:2px;text-transform:uppercase;letter-spacing:1px">주제 목록</div>
      <div style="color:#2a2d3a;font-size:10px" id="yt-count-label"></div>
    </div>
    <div style="flex:1;overflow:auto;padding:4px 10px">
      <div id="yt-topic-list"></div>
    </div>
    <div style="padding:10px 14px 16px;flex-shrink:0">
      <button onclick="openYTModal()" style="width:100%;background:#1e2130;border:1px solid rgba(255,0,0,.3);color:#ff6b6b;font-weight:700;border-radius:8px;padding:10px;cursor:pointer;font-family:inherit;font-size:13px">+ 주제 추가</button>
    </div>
  </div>
</div>

<!-- ===== MAIN AREA ===== -->
<div class="main" id="main">

  <!-- Project main -->
  <div id="proj-main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button id="menu-btn" onclick="toggleSidebar()" style="display:none;background:#1e2130;border:1px solid #2a2d3a;color:#aaa;font-size:16px;border-radius:8px;padding:6px 10px;cursor:pointer">☰</button>
      <h1 id="proj-title" style="color:#fff;font-size:18px;font-weight:700;flex:1"></h1>
      <button onclick="deleteProject()" style="background:#2a1a1a;border:1px solid #4a2020;color:#f87171;font-size:12px;border-radius:7px;padding:5px 10px;cursor:pointer">삭제</button>
    </div>
    <div id="status-btns" style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:12px">
      <div class="card">
        <div style="color:#444;font-size:10px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">🔗 링크</div>
        <div id="proj-link"></div>
      </div>
      <div class="card">
        <div style="color:#444;font-size:10px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">📁 파일</div>
        <div id="proj-filecount" style="color:#fff;font-size:26px;font-weight:700"></div>
        <div style="color:#333;font-size:11px">개 파일</div>
      </div>
      <div class="card">
        <div style="color:#444;font-size:10px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">📊 상태</div>
        <div id="proj-status-display"></div>
      </div>
    </div>
    <div id="proj-tags" style="margin-bottom:12px"></div>
    <div class="card">
      <div style="color:#444;font-size:10px;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">📂 코드 파일 목록</div>
      <div id="proj-files"></div>
    </div>
    <div class="card" style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="color:#444;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px">📝 메모</div>
        <div id="memo-btns"></div>
      </div>
      <div id="memo-view"></div>
      <textarea id="memo-edit" class="inp" style="display:none;min-height:100px;resize:vertical"></textarea>
    </div>
  </div>

  <!-- ===== YouTube main ===== -->
  <div id="yt-main" style="display:none"></div>

</div>

<!-- Project Add Modal -->
<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h2 style="color:#fff;margin:0 0 16px;font-size:16px">새 프로젝트 추가</h2>
    <div style="margin-bottom:10px"><div style="color:#555;font-size:12px;margin-bottom:4px">이름</div><input class="inp" id="f-name" placeholder="프로젝트 이름"/></div>
    <div style="margin-bottom:10px"><div style="color:#555;font-size:12px;margin-bottom:4px">이모지</div><input class="inp" id="f-emoji" placeholder="🚀" value="🚀"/></div>
    <div style="margin-bottom:10px"><div style="color:#555;font-size:12px;margin-bottom:4px">링크</div><input class="inp" id="f-link" placeholder="https://..."/></div>
    <div style="margin-bottom:10px"><div style="color:#555;font-size:12px;margin-bottom:4px">태그 (쉼표 구분)</div><input class="inp" id="f-tags" placeholder="React, Python"/></div>
    <div style="margin-bottom:10px"><div style="color:#555;font-size:12px;margin-bottom:4px">파일 (쉼표 구분)</div><input class="inp" id="f-files" placeholder="App.jsx, main.py"/></div>
    <div style="margin-bottom:10px"><div style="color:#555;font-size:12px;margin-bottom:4px">메모</div><input class="inp" id="f-memo" placeholder="간단한 설명"/></div>
    <div style="margin-bottom:16px">
      <div style="color:#555;font-size:12px;margin-bottom:4px">상태</div>
      <select class="inp" id="f-status"><option>계획중</option><option>진행중</option><option>완료</option><option>중단</option></select>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn" onclick="addProject()" style="flex:1;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-weight:600;padding:11px">추가</button>
      <button class="btn" onclick="closeModal()" style="flex:1;background:#1e2130;border:1px solid #2a2d3a;color:#666;padding:11px">취소</button>
    </div>
  </div>
</div>

<!-- YouTube Add Topic Modal -->
<div class="modal-bg" id="yt-modal" style="display:none">
  <div class="modal" style="max-width:400px">
    <h2 style="color:#fff;margin:0 0 16px;font-size:16px">🎬 새 유튜브 주제 추가</h2>
    <div style="margin-bottom:10px">
      <div style="color:#555;font-size:12px;margin-bottom:4px">주제 *</div>
      <input class="inp" id="yt-topic-input" placeholder="예: 리액트 입문, 재테크 기초, 맛집 리뷰..."/>
    </div>
    <div style="margin-bottom:10px">
      <div style="color:#555;font-size:12px;margin-bottom:4px">카테고리</div>
      <select class="inp" id="yt-cat-select">
        <option value="튜토리얼">🎓 튜토리얼</option>
        <option value="리뷰">⭐ 리뷰</option>
        <option value="브이로그">🎥 브이로그</option>
        <option value="정보·팁">💡 정보·팁</option>
        <option value="엔터테인먼트">🎭 엔터테인먼트</option>
        <option value="분석·정리">📊 분석·정리</option>
        <option value="쇼츠">⚡ 쇼츠</option>
      </select>
    </div>
    <div style="margin-bottom:16px">
      <div style="color:#555;font-size:12px;margin-bottom:4px">메모 (선택)</div>
      <textarea class="inp" id="yt-topic-memo" style="min-height:70px;resize:vertical" placeholder="아이디어 메모, 참고 링크 등..."></textarea>
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="addYTTopic()" style="flex:1;background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff;font-weight:700;border:none;border-radius:8px;padding:12px;cursor:pointer;font-family:inherit;font-size:14px">추가</button>
      <button onclick="closeYTModal()" style="flex:1;background:#1e2130;border:1px solid #2a2d3a;color:#666;border-radius:8px;padding:12px;cursor:pointer;font-family:inherit">취소</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  PROJECT MODE (기존 로직 그대로)
// ============================================================
var STATUS = {
  '완료':   {dot:'#34d399', bg:'#059669'},
  '진행중': {dot:'#60a5fa', bg:'#2563eb'},
  '계획중': {dot:'#a78bfa', bg:'#7c3aed'},
  '중단':   {dot:'#6b7280', bg:'#374151'}
};
var PALETTE = ['#6ee7b7','#93c5fd','#fca5a5','#fde68a','#c4b5fd','#fdba74'];
var DEFAULT_PROJECTS = [
  {id:1,name:'Todo App',emoji:'✅',status:'완료',tags:['React','Tailwind'],link:'',files:['App.jsx','TodoList.jsx'],memo:'기본 CRUD 완성',color:'#6ee7b7'},
  {id:2,name:'포트폴리오 사이트',emoji:'🌐',status:'진행중',tags:['Next.js'],link:'',files:['index.tsx','About.tsx'],memo:'프로젝트 섹션 작업 중',color:'#93c5fd'},
  {id:3,name:'AI 챗봇',emoji:'🤖',status:'계획중',tags:['Python','Claude API'],link:'',files:['main.py'],memo:'프롬프트 설계 단계',color:'#fca5a5'}
];

var projects = [];
var selected = null;
var filter = '전체';
var sidebarOpen = true;

function fileIcon(f) {
  if (f.endsWith('.jsx')||f.endsWith('.tsx')) return '⚛️';
  if (f.endsWith('.py')) return '🐍';
  if (f.endsWith('.css')) return '🎨';
  if (f.endsWith('.md')) return '📝';
  return '📄';
}

function loadData() {
  try {
    var d = localStorage.getItem('vibe_v1');
    projects = d ? JSON.parse(d) : DEFAULT_PROJECTS.slice();
  } catch(e) { projects = DEFAULT_PROJECTS.slice(); }
}

function saveData() {
  try { localStorage.setItem('vibe_v1', JSON.stringify(projects)); } catch(e){}
}

function render() {
  renderStats(); renderFilters(); renderList();
  if (selected) renderMain();
}

function renderStats() {
  var html = '';
  var keys = Object.keys(STATUS);
  for (var i=0; i<keys.length; i++) {
    var s = keys[i];
    var n = projects.filter(function(p){return p.status===s;}).length;
    html += '<div class="stat-card" style="border-left:3px solid '+STATUS[s].dot+'">' +
      '<div style="color:#fff;font-size:18px;font-weight:700">'+n+'</div>' +
      '<div style="color:#555;font-size:11px">'+s+'</div></div>';
  }
  document.getElementById('stats').innerHTML = html;
}

function renderFilters() {
  var all = ['전체'].concat(Object.keys(STATUS));
  var html = '';
  for (var i=0; i<all.length; i++) {
    var s = all[i];
    var cnt = s!=='전체' ? projects.filter(function(p){return p.status===s;}).length : '';
    var active = filter===s;
    html += '<button onclick="setFilter(\''+s+'\')" style="display:flex;justify-content:space-between;align-items:center;width:100%;background:transparent;border:none;border-left:3px solid '+(active?'#7c3aed':'transparent')+';padding:6px 10px;color:'+(active?'#e0e0e0':'#555')+';font-size:13px;cursor:pointer;font-family:inherit">' +
      '<span>'+s+'</span>'+(s!=='전체'?'<span style="color:#333;font-size:11px">'+cnt+'</span>':'')+'</button>';
  }
  document.getElementById('filters').innerHTML = html;
}

function renderList() {
  var filtered = filter==='전체' ? projects : projects.filter(function(p){return p.status===filter;});
  var html = '';
  for (var i=0; i<filtered.length; i++) {
    var p = filtered[i];
    var active = selected && selected.id===p.id;
    html += '<button class="proj-btn'+(active?' active':'')+'" onclick="selectProject('+p.id+')" style="border-left:3px solid '+(active?p.color:'transparent')+'">' +
      '<span style="font-size:16px">'+p.emoji+'</span>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="color:#ccc;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.name+'</div>' +
        '<div style="display:flex;align-items:center;gap:4px;margin-top:2px">' +
          '<span class="dot" style="background:'+STATUS[p.status].dot+';width:6px;height:6px"></span>' +
          '<span style="font-size:11px;color:#444">'+p.status+'</span>' +
        '</div></div></button>';
  }
  document.getElementById('proj-list').innerHTML = html;
}

function renderMain() {
  document.getElementById('proj-title').textContent = selected.emoji + ' ' + selected.name;
  var sbHtml = '';
  var keys = Object.keys(STATUS);
  for (var i=0; i<keys.length; i++) {
    var s = keys[i];
    sbHtml += '<button class="status-btn" onclick="setStatus(\''+s+'\')" style="background:'+(selected.status===s?STATUS[s].bg:'#1e2130')+';color:'+(selected.status===s?'#fff':'#555')+'">'+s+'</button>';
  }
  document.getElementById('status-btns').innerHTML = sbHtml;
  document.getElementById('proj-link').innerHTML = selected.link
    ? '<a href="'+selected.link+'" target="_blank" style="color:#60a5fa;font-size:12px;word-break:break-all;text-decoration:none">'+selected.link+'</a>'
    : '<span style="color:#333;font-size:12px">없음</span>';
  document.getElementById('proj-filecount').textContent = selected.files.length;
  document.getElementById('proj-status-display').innerHTML =
    '<span class="dot" style="background:'+STATUS[selected.status].dot+'"></span>' +
    '<span style="color:#fff;font-size:15px;font-weight:600;margin-left:6px">'+selected.status+'</span>';
  document.getElementById('proj-tags').innerHTML = selected.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join('');
  document.getElementById('proj-files').innerHTML = selected.files.length===0
    ? '<span style="color:#333;font-size:13px">파일 없음</span>'
    : selected.files.map(function(f){return '<div class="file-row"><span>'+fileIcon(f)+'</span><span style="color:#bbb;font-size:13px;font-family:monospace">'+f+'</span></div>';}).join('');
  document.getElementById('memo-view').innerHTML = '<div style="color:'+(selected.memo?'#aaa':'#333')+';font-size:13px;line-height:1.7;min-height:60px">'+(selected.memo||'메모를 추가해보세요...')+'</div>';
  document.getElementById('memo-edit').value = selected.memo;
  document.getElementById('memo-edit').style.display = 'none';
  document.getElementById('memo-view').style.display = 'block';
  document.getElementById('memo-btns').innerHTML = '<button class="btn" onclick="startEditMemo()" style="background:#1e2130;border:1px solid #2a2d3a;color:#555;font-size:12px">편집</button>';
}

function selectProject(id) {
  for (var i=0; i<projects.length; i++) {
    if (projects[i].id===id) { selected=projects[i]; break; }
  }
  render();
}

function setFilter(f) { filter=f; renderFilters(); renderList(); }

function setStatus(s) {
  for (var i=0; i<projects.length; i++) {
    if (projects[i].id===selected.id) { projects[i].status=s; selected=projects[i]; break; }
  }
  saveData(); render();
}

function deleteProject() {
  if (!selected) return;
  if (!confirm('"'+selected.name+'" 삭제할까요?')) return;
  projects = projects.filter(function(p){return p.id!==selected.id;});
  selected = projects.length>0 ? projects[0] : null;
  saveData(); render();
}

function startEditMemo() {
  document.getElementById('memo-view').style.display='none';
  document.getElementById('memo-edit').style.display='block';
  document.getElementById('memo-btns').innerHTML=

function saveMemo() {
  var val = document.getElementById('memo-edit').value;
  for (var i=0; i<projects.length; i++) {
    if (projects[i].id===selected.id) { projects[i].memo=val; selected=projects[i]; break; }
  }
  saveData(); renderMain(); renderList();
}

function cancelMemo() { renderMain(); }

function toggleSidebar() {
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('hidden',!sidebarOpen);
  document.getElementById('main').classList.toggle('full',!sidebarOpen);
  document.getElementById('menu-btn').style.display=sidebarOpen?'none':'block';
}

function openModal() { document.getElementById('modal').style.display='flex'; }
function closeModal() { document.getElementById('modal').style.display='none'; }

function addProject() {
  var p = {
    id: Date.now(),
    name: document.getElementById('f-name').value || '새 프로젝트',
    emoji: document.getElementById('f-emoji').value || '🚀',

function loadYTData() {

function saveYTData() {
  try { localStorage.setItem('vibe_yt_v1', JSON.stringify(ytTopics)); } catch(e){}

// ----- Mode switching -----
function setMode(m) {
  mode = m;
  var ps = document.getElementById('proj-sidebar');
  var ys = document.getElementById('yt-sidebar');
  var pm = document.getElementById('proj-main');
  var ym = document.getElementById('yt-main');
  var tp = document.getElementById('tab-proj');
  var ty = document.getElementById('tab-yt');

  if (m === 'proj') {
    ps.style.display = 'flex'; ps.style.flexDirection = 'column';
    ys.style.display = 'none';
    pm.style.display = 'block';
    ym.style.display = 'none';
    tp.classList.add('active'); ty.classList.remove('active');
    render();
  } else {
    ps.style.display = 'none';
    ys.style.display = 'flex'; ys.style.flexDirection = 'column';
    pm.style.display = 'none';
    ym.style.display = 'block';
    tp.classList.remove('active'); ty.classList.add('active');

    return;
  }

  var statusColor = {'아이디어':'#a78bfa','제작중':'#60a5fa','완료':'#34d399'};
  var html = '';
  ytTopics.forEach(function(t) {
    var active = selectedTopic && selectedTopic.id === t.id;
    var em = YT_CAT_EMOJI[t.category] || '🎬';
    html += '<button class="yt-topic-btn'+(active?' active':'')+'" onclick="selectTopic('+t.id+')" style="border-left-color:'+(active?'#ff0000':'transparent')+'">';

    html += '<span style="font-size:11px;color:#444">'+t.status+'</span>';

    '🔍 제목 & 설명문 작성 (SEO 최적화)',
    '🏷️ 태그 15개 추가',
    '⬆️ 유튜브 업로드 & 예약 설정',
    '📣 SNS 홍보 (인스타, 트위터 등)',
    '💬 초반 24시간 댓글 관리'
  ];

  return {titles:titles, script:script, keywords:keywords, descFirstLine:descFirstLine, thumbnails:thumbnails, checklist:checklist};
}

// ----- Kit copy actions -----
function copyKitItem(type, idx) {
  if (!currentKit) return;
  var text = '';
  if (type === 'title')  text = currentKit.titles[idx].title;
  if (type === 'kw')     text = currentKit.keywords[idx];
  if (type === 'allkw')  text = currentKit.keywords.join(', ');
  if (type === 'desc')   text = currentKit.descFirstLine;
  if (type === 'thumb')  text = currentKit.thumbnails[idx].text;
  copyText(text);
}

// ----- Topic status -----
function setTopicStatus(id, status) {
  for (var i=0; i<ytTopics.length; i++) {
    if (ytTopics[i].id === id) { ytTopics[i].status = status; selectedTopic = ytTopics[i]; break; }
  }
  saveYTData();
  renderYTSidebar();
  renderYTMain(selectedTopic);
}

// ----- Checklist toggle -----
function toggleTopicCheck(id, idx) {
  for (var i=0; i<ytTopics.length; i++) {
    if (ytTopics[i].id === id) {
      if (!ytTopics[i].checklist) ytTopics[i].checklist = {};
      ytTopics[i].checklist[idx] = !ytTopics[i].checklist[idx];
      selectedTopic = ytTopics[i];
      break;
    }
  }
  saveYTData();
  renderYTMain(selectedTopic);
}

// ----- Delete topic -----
function deleteTopic(id) {
  if (!confirm('이 주제를 삭제할까요?')) return;
  ytTopics = ytTopics.filter(function(t){ return t.id !== id; });
  selectedTopic = ytTopics.length > 0 ? ytTopics[0] : null;
  saveYTData();
  renderYTSidebar();
  if (selectedTopic) renderYTMain(selectedTopic);
  else renderYTEmpty();
}

// ----- Add topic modal -----
function openYTModal() { document.getElementById('yt-modal').style.display = 'flex'; }
function closeYTModal() { document.getElementById('yt-modal').style.display = 'none'; }

function addYTTopic() {
  var topicVal = (document.getElementById('yt-topic-input').value||'').trim();
  if (!topicVal) { alert('주제를 입력해주세요!'); return; }
  var t = {
    id: Date.now(),
    topic: topicVal,
    category: document.getElementById('yt-cat-select').value,
    memo: document.getElementById('yt-topic-memo').value,
    status: '아이디어',
    checklist: {}
  };
  ytTopics.push(t);
  selectedTopic = t;
  saveYTData();
  closeYTModal();
  document.getElementById('yt-topic-input').value = '';
  document.getElementById('yt-topic-memo').value = '';
  renderYTSidebar();
  renderYTMain(selectedTopic);
}

// ----- Utilities -----
function copyText(text) {
  if (!text) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){ showToast('복사됨 📋'); });
  } else {
    showToast('복사 지원 안됨');
  }
}

function showToast(msg) {
  var old = document.querySelector('.toast-msg');
  if (old) old.remove();
  var el = document.createElement('div');
  el.className = 'toast-msg';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function(){ if (el.parentNode) el.parentNode.removeChild(el); }, 1800);
}

function esc(str) {
  return String(str||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ----- Init -----
loadData();
loadYTData();
if (projects.length > 0) selected = projects[0];
render();
</script>
