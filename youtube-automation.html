<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>YouTube 자동화 시스템</title>
<meta name="theme-color" content="#0f1117"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0f1117;color:#fff;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:3px}

/* Layout */
.sidebar{width:220px;background:#16181f;border-right:1px solid #1e2130;height:100vh;position:fixed;left:0;top:0;display:flex;flex-direction:column;overflow:hidden;transition:.25s;z-index:100}
.sidebar.hidden{width:0}
.main{margin-left:220px;padding:28px 28px 60px;min-height:100vh;transition:.25s}
.main.full{margin-left:0}

/* Common */
.card{background:#16181f;border:1px solid #1e2130;border-radius:12px;padding:18px;margin-bottom:14px}
.btn{border:none;border-radius:8px;padding:9px 16px;cursor:pointer;font-size:13px;font-family:inherit;transition:.15s}
.btn:hover{filter:brightness(1.15)}
.inp{background:#1e2130;border:1px solid #2a2d3a;border-radius:8px;color:#ddd;font-size:13px;padding:9px 12px;outline:none;width:100%;font-family:inherit;transition:border .15s}
.inp:focus{border-color:#7c3aed}
.inp::placeholder{color:#3a3d4a}
.tag-chip{background:#1e2130;border:1px solid #2a2d3a;color:#888;font-size:11px;border-radius:5px;padding:3px 9px;display:inline-block;margin:2px;cursor:pointer}
.tag-chip:hover{border-color:#7c3aed;color:#a78bfa}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.modal{background:#16181f;border:1px solid #2a2d3a;border-radius:16px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow:auto}
.section-title{color:#444;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

/* Nav */
.nav-item{display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:none;border-left:3px solid transparent;padding:9px 14px;cursor:pointer;text-align:left;color:#555;font-family:inherit;font-size:13px;transition:.15s}
.nav-item:hover{color:#aaa;background:#1a1c24}
.nav-item.active{color:#e0e0e0;border-left-color:#ff0000;background:#1a1c24}
.nav-icon{font-size:16px;width:20px;text-align:center}

/* Status badges */
.status-idea{background:rgba(124,58,237,.2);color:#a78bfa;border:1px solid rgba(124,58,237,.3)}
.status-plan{background:rgba(37,99,235,.2);color:#60a5fa;border:1px solid rgba(37,99,235,.3)}
.status-shoot{background:rgba(245,158,11,.2);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.status-edit{background:rgba(249,115,22,.2);color:#fb923c;border:1px solid rgba(249,115,22,.3)}
.status-seo{background:rgba(16,185,129,.2);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.status-done{background:rgba(255,0,0,.2);color:#ff6b6b;border:1px solid rgba(255,0,0,.3)}

/* Video card */
.video-card{background:#16181f;border:1px solid #1e2130;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.15s}
.video-card:hover{border-color:#2a2d3a;background:#1a1c24}
.video-card.selected{border-color:#7c3aed}

/* Checklist */
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1c24}
.check-item:last-child{border-bottom:none}
.checkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid #2a2d3a;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.checkbox.checked{background:#7c3aed;border-color:#7c3aed}

/* Progress bar */
.progress-bar{height:6px;background:#1e2130;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#ff0000);transition:width .4s}

/* Grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.stat-box{background:#16181f;border:1px solid #1e2130;border-radius:10px;padding:14px;text-align:center}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{background:#1e2130;border-radius:6px;padding:6px;min-height:60px;font-size:11px}
.cal-day-num{color:#444;margin-bottom:4px}
.cal-event{background:#7c3aed22;border-left:2px solid #7c3aed;color:#a78bfa;padding:2px 5px;border-radius:3px;font-size:10px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-event.done{background:#ff000022;border-left-color:#ff6b6b;color:#ff6b6b}

/* Textarea */
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}

/* Tooltip/help */
.help-text{color:#444;font-size:12px;margin-top:5px;line-height:1.5}

/* Pulse animation */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.live{animation:pulse 2s infinite;display:inline-block;width:6px;height:6px;background:#ff0000;border-radius:50%}
</style>
</head>

// ===== STATE =====
var videos = [];
var currentPage = 'dashboard';
var selectedVideo = null;
var sidebarOpen = true;

// ===== STORAGE =====
function loadData() {
  try {
    var d = localStorage.getItem('yt_auto_v1');
    videos = d ? JSON.parse(d) : getSampleData();
  } catch(e) { videos = getSampleData(); }
}

function saveData() {
  try { localStorage.setItem('yt_auto_v1', JSON.stringify(videos)); } catch(e) {}
}

function getSampleData() {
  var today = new Date();

// ===== NAVIGATION =====
function goPage(page) {
  currentPage = page;
  var navIds = ['dashboard','videos','script','seo','calendar','checklist','ideas'];
  for (var i=0; i<navIds.length; i++) {
    var el = document.getElementById('nav-'+navIds[i]);
    if (el) el.classList.toggle('active', navIds[i]===page);
  }
  var titles = {
    dashboard:'📊 대시보드', videos:'🎬 영상 관리', script:'✍️ 스크립트 생성기',
    seo:'🔍 SEO 최적화 도구', calendar:'📅 업로드 캘린더', checklist:'✅ 제작 체크리스트', ideas:'💡 아이디어 뱅크'
  };
  document.getElementById('page-title').textContent = titles[page] || '';
  renderPage();
}

function renderPage() {
  var c = document.getElementById('page-content');
  if (currentPage === 'dashboard')  c.innerHTML = renderDashboard();
  if (currentPage === 'videos')     c.innerHTML = renderVideos();
  if (currentPage === 'script')     c.innerHTML = renderScript();
  if (currentPage === 'seo')        c.innerHTML = renderSEO();
  if (currentPage === 'calendar')   c.innerHTML = renderCalendar();
  if (currentPage === 'checklist')  c.innerHTML = renderChecklistPage();
  if (currentPage === 'ideas')      c.innerHTML = renderIdeas();
  updateSidebarCount();
  bindCheckboxes();
}

// ===== DASHBOARD =====
function renderDashboard() {
  var counts = {};
  Object.keys(STATUSES).forEach(function(s){ counts[s] = 0; });
  videos.forEach(function(v){ counts[v.status]++; });

  var total = videos.length;
  var done = counts.done;
  var inProgress = counts.plan + counts.shoot + counts.edit + counts.seo;
  var upcoming = videos.filter(function(v){
    if (!v.date) return false;
    var d = new Date(v.date);
    var now = new Date();
    return d >= now && (v.status !== 'done');
  }).sort(function(a,b){ return new Date(a.date)-new Date(b.date); });

  var html = '';

  // Stats
  html += '<div class="stat-grid">';
  html += '<div class="stat-box"><div style="font-size:28px;font-weight:800;color:#fff">'+total+'</div><div style="color:#444;font-size:11px;margin-top:4px">전체 영상</div></div>';
  html += '<div class="stat-box" style="border-color:rgba(255,0,0,.3)"><div style="font-size:28px;font-weight:800;color:#ff6b6b">'+done+'</div><div style="color:#444;font-size:11px;margin-top:4px">업로드 완료</div></div>';
  html += '<div class="stat-box" style="border-color:rgba(96,165,250,.3)"><div style="font-size:28px;font-weight:800;color:#60a5fa">'+inProgress+'</div><div style="color:#444;font-size:11px;margin-top:4px">제작중</div></div>';
  html += '<div class="stat-box" style="border-color:rgba(167,139,250,.3)"><div style="font-size:28px;font-weight:800;color:#a78bfa">'+counts.idea+'</div><div style="color:#444;font-size:11px;margin-top:4px">아이디어</div></div>';
  html += '</div>';

  // Pipeline visualization
  html += '<div class="card">';
  html += '<div class="section-title">🚀 제작 파이프라인</div>';
  html += '<div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap">';
  var statusOrder = ['idea','plan','shoot','edit','seo','done'];
  statusOrder.forEach(function(s) {
    var n = counts[s];
    html += '<div style="flex:1;min-width:80px;text-align:center;background:#1e2130;border-radius:8px;padding:10px 6px">';
    html += '<div class="badge '+STATUSES[s].cls+'" style="margin-bottom:6px;font-size:10px">'+STATUSES[s].label+'</div>';
    html += '<div style="font-size:22px;font-weight:800;color:#fff">'+n+'</div>';
    html += '</div>';
  });
  html += '</div>';
  // Pipeline flow arrow
  html += '<div style="display:flex;align-items:center;gap:2px;overflow-x:auto;padding:4px 0">';
  statusOrder.forEach(function(s, i) {
    var n = counts[s];
    var pct = total ? (n/total*100) : 0;
    html += '<div style="flex:1;min-width:40px">';
    html += '<div style="height:8px;background:#1e2130;border-radius:4px;overflow:hidden">';
    html += '<div style="height:100%;width:'+pct+'%;background:'+getPipelineColor(s)+';border-radius:4px;transition:.4s"></div>';
    html += '</div>';
    html += '</div>';
    if (i < statusOrder.length-1) html += '<div style="color:#333;font-size:10px;flex-shrink:0">→</div>';
  });
  html += '</div>';
  html += '</div>';

  // Upcoming uploads
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';

  html += '<div class="card">';
  html += '<div class="section-title">📅 다가오는 업로드</div>';
  if (upcoming.length === 0) {
    html += '<div style="color:#333;font-size:13px;padding:10px 0">예정된 업로드가 없습니다</div>';
  } else {
    upcoming.slice(0,4).forEach(function(v) {
      var daysLeft = Math.ceil((new Date(v.date)-new Date())/(1000*60*60*24));
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1c24">';
      html += '<div style="width:36px;height:36px;background:#1e2130;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;color:'+(daysLeft<=3?'#ff6b6b':daysLeft<=7?'#fbbf24':'#60a5fa')+'">D-'+daysLeft+'</div>';
      html += '<div style="flex:1;min-width:0"><div style="color:#ccc;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+v.title+'</div>';
      html += '<div><span class="badge '+STATUSES[v.status].cls+'" style="font-size:10px">'+STATUSES[v.status].label+'</span></div></div>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Recent activity
  html += '<div class="card">';
  html += '<div class="section-title">🔥 최근 추가 영상</div>';
  var recent = videos.slice().sort(function(a,b){return b.id-a.id;}).slice(0,4);
  recent.forEach(function(v) {
    html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1a1c24;cursor:pointer" onclick="openDetail('+v.id+')">';
    html += '<span class="badge '+STATUSES[v.status].cls+'" style="font-size:10px;flex-shrink:0">'+STATUSES[v.status].label+'</span>';
    html += '<span style="color:#ccc;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">'+v.title+'</span>';
    html += '</div>';
  });
  html += '</div>';

  html += '</div>'; // grid

  // Quick tips
  html += '<div class="card" style="margin-top:14px;border-color:rgba(124,58,237,.2);background:rgba(124,58,237,.05)">';
  html += '<div class="section-title" style="color:#7c3aed">⚡ 자동화 꿀팁</div>';
  var tips = [
    '📌 영상 업로드 최적 시간: 화/수/목 오후 6~9시 (한국 기준)',
    '🎯 제목은 반드시 60자 이내, 핵심 키워드를 앞에 배치하세요',
    '🏷️ 태그는 관련 키워드 15개, 첫 3개가 가장 중요합니다',
    '📝 설명문 첫 200자가 검색 결과에 노출됩니다 — 핵심 키워드 포함!'
  ];
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  tips.forEach(function(tip) {
    html += '<div style="background:#1e2130;border-radius:8px;padding:10px;font-size:12px;color:#888;line-height:1.5">'+tip+'</div>';
  });
  html += '</div>';
  html += '</div>';

  return html;
}

function getPipelineColor(s) {
  var colors = {idea:'#a78bfa',plan:'#60a5fa',shoot:'#fbbf24',edit:'#fb923c',seo:'#34d399',done:'#ff6b6b'};
  return colors[s] || '#444';
}

// ===== VIDEOS =====
function renderVideos() {
  var html = '';

  // Filter buttons
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">';
  html += '<button onclick="filterVideos(\'all\')" id="vf-all" class="btn" style="background:#ff0000;color:#fff;font-size:12px">전체 ('+videos.length+')</button>';
  Object.keys(STATUSES).forEach(function(s) {
    var n = videos.filter(function(v){return v.status===s;}).length;
    html += '<button onclick="filterVideos(\''+s+'\')" id="vf-'+s+'" class="btn" style="background:#1e2130;border:1px solid #2a2d3a;color:#666;font-size:12px">'+STATUSES[s].label+' ('+n+')</button>';
  });
  html += '</div>';

  // Video list
  html += '<div id="video-list">';
  videos.forEach(function(v) {
    html += renderVideoCard(v);
  });
  html += '</div>';

  return html;
}

function renderVideoCard(v) {
  var progress = calcProgress(v);
  return '<div class="video-card" id="vc-'+v.id+'" onclick="openDetail('+v.id+')">' +
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px">' +
      '<div style="flex:1;min-width:0">' +
        '<div style="color:#e0e0e0;font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.4">'+v.title+'</div>' +
        '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">' +
          '<span class="badge '+STATUSES[v.status].cls+'">'+STATUSES[v.status].label+'</span>' +
          (v.topic?'<span class="tag-chip">'+v.topic+'</span>':'') +
          (v.date?'<span style="color:#444;font-size:11px">📅 '+v.date+'</span>':'') +
          (v.length?'<span style="color:#444;font-size:11px">⏱️ '+v.length+'분</span>':'') +
        '</div>' +
      '</div>' +
      '<button onclick="event.stopPropagation();deleteVideo('+v.id+')" style="background:none;border:none;color:#333;cursor:pointer;font-size:14px;flex-shrink:0;padding:2px 6px" title="삭제">✕</button>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:8px">' +
      '<div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:'+progress+'%"></div></div>' +
      '<span style="color:#555;font-size:11px;flex-shrink:0">'+progress+'%</span>' +
    '</div>' +
    (v.memo?'<div style="color:#444;font-size:11px;margin-top:6px">💬 '+v.memo+'</div>':'') +
  '</div>';
}

function filterVideos(status) {
  var list = document.getElementById('video-list');
  if (!list) return;
  var all = status === 'all' ? videos : videos.filter(function(v){return v.status===status;});
  list.innerHTML = all.map(renderVideoCard).join('');
}

function calcProgress(v) {
  var statusOrder = ['idea','plan','shoot','edit','seo','done'];
  var idx = statusOrder.indexOf(v.status);
  if (idx < 0) return 0;
  return Math.round((idx / (statusOrder.length-1)) * 100);
}

// ===== DETAIL MODAL =====
function openDetail(id) {
  for (var i=0; i<videos.length; i++) {
    if (videos[i].id === id) { selectedVideo = videos[i]; break; }
  }
  if (!selectedVideo) return;
  var v = selectedVideo;
  var checks = v.checklist[v.status] || [];
  var tmpl = CHECKLIST_TEMPLATES[v.status] || [];
  var progress = calcProgress(v);

  var html = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">';
  html += '<h3 style="color:#fff;font-size:15px;font-weight:700;flex:1;padding-right:10px;line-height:1.4">'+v.title+'</h3>';
  html += '</div>';

  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">';
  html += '<span class="badge '+STATUSES[v.status].cls+'">'+STATUSES[v.status].label+'</span>';
  if(v.topic) html += '<span class="tag-chip">'+v.topic+'</span>';
  if(v.date) html += '<span style="color:#555;font-size:12px">📅 '+v.date+'</span>';
  if(v.length) html += '<span style="color:#555;font-size:12px">⏱️ '+v.length+'분</span>';
  html += '</div>';

  // Progress
  html += '<div style="margin-bottom:16px">';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="color:#555;font-size:12px">전체 진행률</span><span style="color:#fff;font-size:12px;font-weight:700">'+progress+'%</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:'+progress+'%"></div></div>';
  html += '</div>';

  // Status changer
  html += '<div style="margin-bottom:14px"><div class="section-title">상태 변경</div>';
  html += '<div style="display:flex;gap:5px;flex-wrap:wrap">';
  Object.keys(STATUSES).forEach(function(s) {
    var active = v.status === s;
    html += '<button onclick="changeVideoStatus('+v.id+',\''+s+'\')" class="badge '+STATUSES[s].cls+'" style="cursor:pointer;border:none;font-family:inherit;opacity:'+(active?'1':'0.4')+';transform:scale('+(active?'1.05':'1')+')">'+STATUSES[s].label+'</button>';
  });
  html += '</div></div>';

  // Current checklist
  html += '<div style="margin-bottom:14px"><div class="section-title">현재 단계 체크리스트 — '+STATUSES[v.status].label+'</div>';
  html += '<div id="detail-checklist">';
  tmpl.forEach(function(item, i) {
    var checked = checks[i] === true;
    html += '<div class="check-item">';
    html += '<div class="checkbox'+(checked?' checked':'')+'" onclick="toggleCheck('+v.id+',\''+v.status+'\','+i+')" id="chk-'+v.id+'-'+v.status+'-'+i+'">'+(checked?'<span style="color:#fff;font-size:12px">✓</span>':'')+'</div>';
    html += '<span style="color:'+(checked?'#555':'#ccc')+';font-size:13px;'+(checked?'text-decoration:line-through':'')+'">'+item+'</span>';
    html += '</div>';
  });
  html += '</div>';

  var checkedCount = checks.filter(Boolean).length;
  html += '<div style="margin-top:8px"><div class="progress-bar"><div class="progress-fill" style="width:'+(tmpl.length?Math.round(checkedCount/tmpl.length*100):0)+'%"></div></div>';
  html += '<div style="color:#444;font-size:11px;margin-top:4px">'+checkedCount+' / '+tmpl.length+' 완료</div></div>';
  html += '</div>';

  // Keywords
  if (v.keywords && v.keywords.length) {
    html += '<div style="margin-bottom:12px"><div class="section-title">키워드</div>';
    html += v.keywords.map(function(k){return '<span class="tag-chip">'+k+'</span>';}).join('');
    html += '</div>';
  }

  // Memo
  html += '<div><div class="section-title">메모</div>';
  html += '<textarea class="inp" id="detail-memo" style="min-height:60px">'+escHtml(v.memo||'')+'</textarea>';
  html += '<button onclick="saveMemo('+v.id+')" class="btn" style="background:#7c3aed;color:#fff;margin-top:8px;width:100%">메모 저장</button>';
  html += '</div>';

  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-modal').style.display = 'flex';
}

function closeDetailModal() {
  document.getElementById('detail-modal').style.display = 'none';
  selectedVideo = null;
  renderPage();
}

function changeVideoStatus(id, status) {
  for (var i=0; i<videos.length; i++) {
    if (videos[i].id === id) {
      videos[i].status = status;
      selectedVideo = videos[i];
      break;
    }
  }
  saveData();
  openDetail(id);
}

function toggleCheck(id, status, idx) {
  for (var i=0; i<videos.length; i++) {
    if (videos[i].id === id) {
      if (!videos[i].checklist[status]) videos[i].checklist[status] = [];
      videos[i].checklist[status][idx] = !videos[i].checklist[status][idx];
      break;
    }
  }
  saveData();
  openDetail(id);
}

function saveMemo(id) {
  var val = document.getElementById('detail-memo').value;
  for (var i=0; i<videos.length; i++) {
    if (videos[i].id === id) { videos[i].memo = val; break; }
  }
  saveData();
  var btn = document.querySelector('#detail-content .btn');
  if (btn) { btn.textContent = '✓ 저장됨'; setTimeout(function(){btn.textContent='메모 저장';},1500); }
}

function deleteVideo(id) {
  if (!confirm('이 영상을 삭제할까요?')) return;
  videos = videos.filter(function(v){return v.id!==id;});
  saveData();
  renderPage();
}

// ===== SCRIPT GENERATOR =====
function renderScript() {
  var html = '<div style="display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start">';

  // Template list
  html += '<div>';
  html += '<div class="section-title">템플릿 선택</div>';
  Object.keys(SCRIPT_TEMPLATES).forEach(function(key) {
    var t = SCRIPT_TEMPLATES[key];
    html += '<button onclick="loadScriptTemplate(\''+key+'\')" class="btn" style="width:100%;background:#1e2130;border:1px solid #2a2d3a;color:#aaa;margin-bottom:6px;text-align:left;padding:10px 12px">'+t.name+'</button>';
  });
  html += '<div style="margin-top:16px"><div class="section-title">내 영상 제목</div>';
  html += '<input class="inp" id="script-title" placeholder="영상 제목 입력 후 적용"/>';
  html += '<button onclick="applyTitle()" class="btn" style="width:100%;background:#7c3aed;color:#fff;margin-top:6px">제목 적용</button>';
  html += '</div></div>';

  // Script editor
  html += '<div>';
  html += '<div class="card" id="script-output">';
  html += '<div style="color:#333;text-align:center;padding:40px 0;font-size:14px">← 왼쪽에서 템플릿을 선택하세요</div>';
  html += '</div>';
  html += '</div>';

  html += '</div>';
  return html;
}

function loadScriptTemplate(key) {
  var t = SCRIPT_TEMPLATES[key];
  var title = (document.getElementById('script-title') && document.getElementById('script-title').value) || '[영상 제목]';
  var out = document.getElementById('script-output');
  if (!out) return;

  var html = '<div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">';
  html += '<div style="color:#fff;font-size:14px;font-weight:700">'+t.name+' 스크립트</div>';
  html += '<button onclick="copyAllScript()" class="btn" style="background:#1e2130;border:1px solid #2a2d3a;color:#aaa;font-size:12px">📋 전체 복사</button>';
  html += '</div>';

  t.sections.forEach(function(sec, i) {
    html += '<div style="margin-bottom:14px">';
    html += '<div style="color:#7c3aed;font-size:12px;font-weight:700;margin-bottom:6px">'+sec.title+'</div>';
    html += '<textarea class="inp script-section" style="min-height:70px;resize:vertical" id="script-sec-'+i+'" placeholder="'+sec.title+'...">'+sec.template.replace(/\[영상 제목\]/g,title)+'</textarea>';
    html += '</div>';
  });

  html += '<button onclick="copyAllScript()" class="btn" style="width:100%;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-weight:600;margin-top:8px">📋 전체 스크립트 복사</button>';
  out.innerHTML = html;
}

function applyTitle() {
  var title = document.getElementById('script-title').value || '[영상 제목]';
  document.querySelectorAll('.script-section').forEach(function(ta) {
    ta.value = ta.value.replace(/\[영상 제목\]/g, title);
  });
}

function copyAllScript() {
  var sections = document.querySelectorAll('.script-section');
  var text = '';
  sections.forEach(function(s, i) {

function analyzeSEOTitle() {
  var title = document.getElementById('seo-title').value;
  var out = document.getElementById('title-analysis');
  if (!title) { out.innerHTML = ''; return; }

  var issues = [];
  var good = [];

  if (title.length <= 60) good.push('✅ 길이 적절 ('+title.length+'자)');
  else issues.push('⚠️ 제목이 너무 길어요 ('+title.length+'자 / 60자 권장)');

  var hasNumber = /\d/.test(title);
  if (hasNumber) good.push('✅ 숫자 포함 — CTR 향상');
  else issues.push('💡 숫자 추가 권장 (예: "5가지", "10분")');

  var powerWords = ['완벽','완전','꿀팁','비밀','충격','공개','직접','솔직','무료','쉬운'];
  var hasPower = powerWords.some(function(w){return title.includes(w);});
  if (hasPower) good.push('✅ 파워워드 포함');
  else issues.push('💡 파워워드 추가 권장 (완벽, 비밀, 꿀팁 등)');

  var emojiRegex = /[\u{1F300}-\u{1F9FF}]/u;
  if (emojiRegex.test(title)) good.push('✅ 이모지 포함 — 시선 집중');

  var score = Math.min(100, Math.round((good.length / (good.length + issues.length)) * 100));
  var color = score >= 80 ? '#34d399' : score >= 50 ? '#fbbf24' : '#f87171';

  out.innerHTML = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
    '<div style="font-size:24px;font-weight:800;color:'+color+'">'+score+'</div>' +
    '<div><div style="font-size:12px;font-weight:700;color:'+color+'">SEO 점수</div>' +
    '<div class="progress-bar" style="width:100px;margin-top:3px"><div class="progress-fill" style="width:'+score+'%;background:'+color+'"></div></div></div>' +
    '</div>' +
    good.map(function(g){return '<div style="font-size:12px;color:#34d399;margin-bottom:3px">'+g+'</div>';}).join('') +
    issues.map(function(i){return '<div style="font-size:12px;color:#fbbf24;margin-bottom:3px">'+i+'</div>';}).join('');
}

// ===== CHECKLIST PAGE =====
function renderChecklistPage() {
  var html = '';

  if (videos.length === 0) {
    return '<div style="color:#444;text-align:center;padding:60px">영상을 먼저 추가해주세요</div>';
  }

  videos.filter(function(v){return v.status!=='done';}).forEach(function(v) {
    var tmpl = CHECKLIST_TEMPLATES[v.status] || [];
    var checks = v.checklist[v.status] || [];
    var checkedCount = checks.filter(Boolean).length;
    var pct = tmpl.length ? Math.round(checkedCount/tmpl.length*100) : 0;

    html += '<div class="card">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
    html += '<div>';
    html += '<div style="color:#e0e0e0;font-size:13px;font-weight:600;margin-bottom:4px">'+v.title+'</div>';
    html += '<span class="badge '+STATUSES[v.status].cls+'">'+STATUSES[v.status].label+'</span>';
    html += '</div>';
    html += '<div style="text-align:right"><div style="color:#fff;font-size:18px;font-weight:800">'+pct+'%</div><div style="color:#444;font-size:11px">'+checkedCount+'/'+tmpl.length+'</div></div>';
    html += '</div>';

    html += '<div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="width:'+pct+'%"></div></div>';

    tmpl.forEach(function(item, i) {
      var checked = checks[i] === true;
      html += '<div class="check-item" id="ci-'+v.id+'-'+i+'">';
      html += '<div class="checkbox'+(checked?' checked':'')+'" onclick="pageToggleCheck('+v.id+',\''+v.status+'\','+i+')">'+(checked?'<span style="color:#fff;font-size:11px">✓</span>':'')+'</div>';
      html += '<span style="color:'+(checked?'#444':'#ccc')+';font-size:13px;'+(checked?'text-decoration:line-through':'')+'">'+item+'</span>';
      html += '</div>';
    });

    html += '</div>';
  });

  if (!html) html = '<div style="color:#444;text-align:center;padding:60px">🎉 모든 영상 제작이 완료됐어요!</div>';
  return html;
}

function pageToggleCheck(id, status, idx) {
  for (var i=0; i<videos.length; i++) {
    if (videos[i].id === id) {
      if (!videos[i].checklist[status]) videos[i].checklist[status] = [];
      videos[i].checklist[status][idx] = !videos[i].checklist[status][idx];
      break;
    }
  }
  saveData();
  renderPage();
}
